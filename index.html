<style>
        :root {
            --bg-dark: #0f111a;
            --card-bg: #1a1c2e;
            --neon-pink: #ff00ff;
            --neon-purple: #9d00ff;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(to right, var(--neon-pink), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 50px;
        }

        #container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 40px; /* Increased gap to prevent halo merging */
            max-width: 1100px;
            width: 100%;
        }

        .prompt-card {
            position: relative;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 3px; /* The thickness of the RGB halo */
            z-index: 1;
            /* Outer glow to keep buttons distinct */
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.2);
        }

        /* The Constant RGB Halo */
        .prompt-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 17px;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple), #00d4ff, var(--neon-pink));
            background-size: 400%;
            z-index: -1;
            animation: move-glow 12s linear infinite;
            filter: blur(5px); /* This creates the "Halo" effect */
            opacity: 0.8;
        }

        .card-content {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .card-content:hover {
            background: #252841; /* Slightly lighter on hover */
        }

        .prompt-name {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        /* Explanation Tooltip */
        .explanation {
            position: absolute;
            bottom: 115%;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            background: rgba(10, 10, 15, 0.95);
            color: #d1d1d1;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            border: 1px solid var(--neon-purple);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
            pointer-events: none;
        }

        .card-content:hover .explanation {
            opacity: 1;
            visibility: visible;
            bottom: 125%; /* Slighly lifts up on hover */
        }

        @keyframes move-glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .copied-msg {
            position: fixed;
            top: 20px;
            background: var(--neon-pink);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            display: none;
            font-weight: bold;
            box-shadow: 0 0 20px var(--neon-pink);
            z-index: 1000;
        }
    </style>
