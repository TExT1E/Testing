<script>
    const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/TExT1E/Testing/main/Prompts.json?t=' + Date.now();
    
    async function loadPrompts() {
        try {
            const res = await fetch(GITHUB_RAW_URL);
            if (!res.ok) throw new Error('Failed to fetch');
            const data = await res.json();
            const container = document.getElementById('container');
            
            for (let key in data) {
                const card = document.createElement('div');
                card.className = 'prompt-card';
                
                // Use the 'summary' field for the hover tooltip
                const displaySummary = data[key].summary;
                // Store the 'prompt' field for the clipboard
                const fullPrompt = data[key].prompt;

                card.innerHTML = `
                    <div class="card-content" onclick="copyText('${key}', \`${fullPrompt}\`)">
                        <div class="explanation"><strong>What this does:</strong><br>${displaySummary}</div>
                        <div class="prompt-name">${key}</div>
                    </div>
                `;
                container.appendChild(card);
            }
        } catch (e) {
            document.getElementById('container').innerHTML = `<p style="color:red">Error loading JSON. Ensure it follows the new { summary, prompt } format.</p>`;
        }
    }

    function copyText(name, text) {
        navigator.clipboard.writeText(text).then(() => {
            const msg = document.getElementById('copiedStatus');
            msg.innerText = name + " Prompt Copied!";
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 2000);
        });
    }

    loadPrompts();
</script>
